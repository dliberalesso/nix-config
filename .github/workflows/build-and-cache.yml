name: "Build & Cache"

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

    paths-ignore:
      - "LICENSE"
      - "README.md"
      - ".editorconfig"
      - ".git-crypt/**"
      - ".gitattributes"
      - ".gitignore"

  workflow_dispatch:

jobs:
  setup-matrix:
    name: "Setup Matrix"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      targets: ${{ steps.set-targets.outputs.targets }}
      has_targets: ${{ steps.set-targets.outputs.has_targets }}
    steps:
      - uses: actions/checkout@v7

      - name: "Installing Nix"
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            always-allow-substitutes = true
            experimental-features = flakes nix-command
          github_access_token: ${{ secrets.PAT }}

      - name: "Generate targets matrix"
        id: set-targets
        run: ./.github/scripts/generate-build-matrix.sh packages

  build-targets:
    name: "Build Targets"
    needs: setup-matrix
    if: always() && needs.setup-matrix.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.setup-matrix.outputs.targets) }}
    steps:
      - uses: actions/checkout@v7

      - name: "Making Room for Nix to Thrive 🌱"
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: "carve"

      - name: "Installing Nix"
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            always-allow-substitutes = true
            experimental-features = flakes nix-command
          github_access_token: ${{ secrets.PAT }}

      - name: "Cache Nix"
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', 'flake.lock') }}

      - name: "Installing Cachix"
        uses: cachix/cachix-action@v17
        with:
          name: dliberalesso
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: cachix, nix-community

      - name: "Build Target"
        run: nix build .#${{ matrix.target }} --accept-flake-config

  check:
    name: "Check Flake"
    needs: [setup-matrix, build-targets]
    if: always() && needs.setup-matrix.result == 'success' && (needs.build-targets.result == 'success' || needs.build-targets.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      hosts: ${{ steps.set-hosts.outputs.hosts }}
      has_hosts: ${{ steps.set-hosts.outputs.has_hosts }}
    steps:
      - uses: actions/checkout@v7

      - name: "Making Room for Nix to Thrive 🌱"
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: "carve"

      - name: "Installing Nix"
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            always-allow-substitutes = true
            experimental-features = flakes nix-command
          github_access_token: ${{ secrets.PAT }}

      - name: "Cache Nix"
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', 'flake.lock') }}

      - name: "Installing Cachix"
        uses: cachix/cachix-action@v17
        with:
          name: dliberalesso
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: cachix, nix-community

      - name: "Check"
        run: nix flake check --accept-flake-config

      - name: "Generate host targets"
        id: set-hosts
        run: ./.github/scripts/generate-build-matrix.sh hosts

  build-hosts:
    name: "Build Hosts"
    needs: check
    if: always() && needs.check.outputs.has_hosts == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        host: ${{ fromJSON(needs.check.outputs.hosts) }}
    steps:
      - uses: actions/checkout@v7

      - name: "Making Room for Nix to Thrive 🌱"
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: "carve"

      - name: "Installing Nix"
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            always-allow-substitutes = true
            experimental-features = flakes nix-command
          github_access_token: ${{ secrets.PAT }}

      - name: "Cache Nix"
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', 'flake.lock') }}

      - name: "Installing Cachix"
        uses: cachix/cachix-action@v17
        with:
          name: dliberalesso
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: cachix, nix-community

      - name: "Build Host"
        run: nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel --accept-flake-config

  status:
    name: "Status"
    if: always()
    needs:
      - setup-matrix
      - build-targets
      - check
      - build-hosts
    runs-on: ubuntu-latest
    steps:
      - name: "Check matrix status"
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
      - name: "Success"
        run: exit 0
